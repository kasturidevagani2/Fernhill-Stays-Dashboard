name: Enable GitHub Pages

on:
  push:
    branches: ["master"]
    paths: [".github/workflows/pages-enable.yml"]
  workflow_dispatch:

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Enable GitHub Pages
        run: |
          # Use GitHub CLI to enable Pages
          # Note: This requires gh to be pre-installed and authenticated
          echo "Attempting to enable Pages via API..."
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' \
            https://api.github.com/repos/${{ github.repository }}/pages || true
          
          echo "GitHub Pages setup complete"
